<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body {
    background: var(--bg-base); background-image: var(--page-radial);
    font-family: var(--font-sans); color: var(--text-primary);
    padding: 26px 28px; box-sizing: border-box;
  }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 18px; }
  .lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-faint); width: 100%; margin-bottom: 2px; }
  .field { max-width: 320px; width: 100%; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, Badge, Eyebrow, IconChip, Input } = window.DorfMoviesDesignSystem_f30e74;
    function Demo() {
      return (
        <div>
          <div className="row"><span className="lbl">Buttons</span>
            <Button variant="primary">Sign In</Button>
            <Button variant="ghost" icon="pencil">Edit</Button>
            <Button variant="accent" iconRight="arrow-right">Start searching</Button>
            <Button variant="link" iconRight="arrow-right">View all</Button>
            <Button variant="primary" disabled>Disabled</Button>
          </div>
          <div className="row"><span className="lbl">Badges &amp; eyebrow</span>
            <Eyebrow icon="sparkles">Welcome back</Eyebrow>
            <Badge tone="emerald" icon="check-circle-2">Watched</Badge>
            <Badge tone="violet" icon="bookmark">Watchlist</Badge>
            <Badge tone="rose" dot>Live Now</Badge>
            <Badge tone="neutral">TV</Badge>
          </div>
          <div className="row"><span className="lbl">Icon chips</span>
            <IconChip icon="calendar" tone="orange" />
            <IconChip icon="flame" tone="violet" />
            <IconChip icon="play" tone="rose" glow />
            <IconChip icon="check" tone="emerald" />
          </div>
          <div className="row"><span className="lbl">Inputs</span>
            <div className="field"><Input icon="search" placeholder="Search movies and TV shows..." /></div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
    requestAnimationFrame(() => window.lucide && window.lucide.createIcons());
    setTimeout(() => window.lucide && window.lucide.createIcons(), 300);
  </script>
</body>
</html>
