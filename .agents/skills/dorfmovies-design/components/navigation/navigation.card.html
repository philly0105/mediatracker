<!-- @dsCard group="Components" viewport="700x320" name="Navigation — Sidebar items" subtitle="Fixed-rail nav rows with active + hover states" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body {
    background: var(--bg-base); background-image: var(--page-radial);
    font-family: var(--font-sans); color: var(--text-primary);
    padding: 24px 28px; box-sizing: border-box;
  }
  .rail { width: 240px; background: var(--bg-base); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 16px; }
  .mark { font-weight: 800; font-size: 22px; letter-spacing: 0.01em; margin: 4px 6px 16px; }
  .mark .o { color: var(--brand-mark); }
  .nav { display: flex; flex-direction: column; gap: 4px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { NavItem } = window.DorfMoviesDesignSystem_f30e74;
    function Demo() {
      return (
        <div className="rail">
          <div className="mark">Dorf<span className="o">Movies</span></div>
          <div className="nav">
            <NavItem icon="home" label="Dashboard" active />
            <NavItem icon="search" label="Search" />
            <NavItem icon="calendar" label="Calendar" />
            <NavItem icon="film" label="Movies" />
            <NavItem icon="tv" label="Shows" />
            <NavItem icon="list-todo" label="Watchlist" />
            <NavItem icon="bar-chart-3" label="Stats" />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
    requestAnimationFrame(() => window.lucide && window.lucide.createIcons());
    setTimeout(() => window.lucide && window.lucide.createIcons(), 300);
  </script>
</body>
</html>
