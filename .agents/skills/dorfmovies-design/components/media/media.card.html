<!-- @dsCard group="Components" viewport="700x340" name="Media — Posters, Rows, Ratings" subtitle="Poster cards, watch-entry rows, star ratings" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body {
    background: var(--bg-void); background-image: var(--page-radial);
    font-family: var(--font-sans); color: var(--text-primary);
    padding: 26px 28px; box-sizing: border-box;
  }
  .wrap { display: grid; grid-template-columns: 170px 1fr; gap: 22px; align-items: start; }
  .rows { display: flex; flex-direction: column; gap: 12px; }
  .lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 10px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { PosterCard, MediaRow, StarRating } = window.DorfMoviesDesignSystem_f30e74;
    const IMG = 'https://image.tmdb.org/t/p/w400';
    function Demo() {
      return (
        <div className="wrap">
          <div>
            <p className="lbl">Poster card</p>
            <PosterCard title="Dune: Part Two" year={2024} rating={4.5}
              posterUrl={IMG + '/1pdfLvkbY9ohJlCjQH2CZjjYVvJ.jpg'} overlay="Watched Jun 12" />
          </div>
          <div>
            <p className="lbl">Watch-entry rows</p>
            <div className="rows">
              <MediaRow title="Oppenheimer" year={2023} type="movie" rating={4.5}
                posterUrl={IMG + '/8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg'}
                review="A towering, relentless character study." watchedAt="2026-06-10" />
              <MediaRow title="Severance" year={2022} type="show" rating={5}
                posterUrl={IMG + '/lFf6LLrQjYldcZItzOkGmMMigP7.jpg'} watchedAt="2026-06-08" />
            </div>
            <p className="lbl" style={{marginTop:16}}>Star rating</p>
            <StarRating value={3.5} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
    requestAnimationFrame(() => window.lucide && window.lucide.createIcons());
    setTimeout(() => window.lucide && window.lucide.createIcons(), 300);
  </script>
</body>
</html>
