<!-- @dsCard group="Colors" viewport="700x150" name="Canvas & surfaces" subtitle="Near-black layers from void to elevated" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:var(--bg-base);font-family:var(--font-sans);color:var(--text-primary);padding:20px;box-sizing:border-box;display:flex;gap:12px}
  .sw{flex:1;border-radius:var(--radius-md);border:1px solid var(--border-soft);height:110px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box}
  .n{font-size:12px;font-weight:700}
  .h{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);margin-top:2px}
</style></head>
<body>
  <div class="sw" style="background:var(--bg-void)"><div class="n">void</div><div class="h">#100e09</div></div>
  <div class="sw" style="background:var(--bg-base)"><div class="n">base / shell</div><div class="h">#15120c</div></div>
  <div class="sw" style="background:var(--bg-raised)"><div class="n">raised / card</div><div class="h">#1b1711</div></div>
  <div class="sw" style="background:var(--bg-elevated)"><div class="n">elevated</div><div class="h">#201b13</div></div>
  <div class="sw" style="background:var(--bg-bar)"><div class="n">bar</div><div class="h">#241f17</div></div>
</body></html>
