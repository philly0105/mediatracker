<!-- @dsCard group="Colors" viewport="700x160" name="Pine green & playful accents" subtitle="Pine-green hero + amber / rust / dusty-teal set" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:var(--bg-base);background-image:var(--page-radial);font-family:var(--font-sans);color:var(--text-primary);padding:20px;box-sizing:border-box;display:flex;flex-direction:column;gap:10px}
  .grp{display:flex;align-items:center;gap:10px}
  .lbl{width:72px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-secondary)}
  .sw{flex:1;height:30px;border-radius:6px;display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:700;font-family:var(--font-mono);color:#11160d}
</style></head>
<body>
  <div class="grp"><span class="lbl">Pine</span>
    <div class="sw" style="background:var(--green-300)">300</div>
    <div class="sw" style="background:var(--green-400)">400</div>
    <div class="sw" style="background:var(--green-500)">500 · #7c9a6a</div>
    <div class="sw" style="background:var(--green-600);color:#e9e2d3">600</div>
    <div class="sw" style="background:var(--green-700);color:#e9e2d3">700</div>
  </div>
  <div class="grp"><span class="lbl">Amber</span>
    <div class="sw" style="background:var(--amber-300)">300</div>
    <div class="sw" style="background:var(--amber-400)">400 · #d3a85c</div>
    <div class="sw" style="background:var(--amber-500)">500</div>
  </div>
  <div class="grp"><span class="lbl">Rust · live</span>
    <div class="sw" style="background:var(--rust-300)">300</div>
    <div class="sw" style="background:var(--rust-400)">400 · #c4805f</div>
    <div class="sw" style="background:var(--rust-500);color:#e9e2d3">500</div>
  </div>
  <div class="grp"><span class="lbl">Teal · watched</span>
    <div class="sw" style="background:var(--teal-300)">300</div>
    <div class="sw" style="background:var(--teal-400)">400 · #6f9089</div>
    <div class="sw" style="background:var(--teal-500);color:#e9e2d3">500</div>
  </div>
</body></html>
