<!-- @dsCard group="Type" viewport="700x180" name="Stat numerals" subtitle="Black weight, gradient-filled, the dashboard hero metric" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:var(--bg-void);background-image:var(--page-radial);font-family:var(--font-sans);color:var(--text-primary);padding:24px 28px;box-sizing:border-box;display:flex;align-items:center;gap:40px}
  .stat{display:flex;flex-direction:column}
  .num{font-size:60px;font-weight:800;line-height:1;letter-spacing:-0.04em}
  .o{background:linear-gradient(135deg,var(--green-300),var(--green-600));-webkit-background-clip:text;background-clip:text;color:transparent}
  .v{background:linear-gradient(135deg,var(--amber-300),var(--amber-500));-webkit-background-clip:text;background-clip:text;color:transparent}
  .r{background:linear-gradient(135deg,var(--rust-300),var(--rust-500));-webkit-background-clip:text;background-clip:text;color:transparent}
  .cap{font-size:13px;color:var(--text-secondary);font-weight:600;margin-top:8px}
</style></head>
<body>
  <div class="stat"><span class="num o">42</span><span class="cap">Watched this year</span></div>
  <div class="stat"><span class="num v">7</span><span class="cap">Must Watch</span></div>
  <div class="stat"><span class="num r">388</span><span class="cap">Hours</span></div>
</body></html>
