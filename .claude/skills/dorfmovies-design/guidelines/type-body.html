<!-- @dsCard group="Type" viewport="700x180" name="Body, meta & eyebrow" subtitle="Medium body, muted meta, tiny tracked uppercase labels" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:var(--bg-base);font-family:var(--font-sans);color:var(--text-primary);padding:24px 28px;box-sizing:border-box;display:flex;flex-direction:column;gap:14px}
  .eyebrow{display:inline-flex;align-self:flex-start;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--violet-300);background:var(--glass-chip);border:1px solid var(--border-default);padding:5px 12px;border-radius:9999px}
  .body{font-size:14px;font-weight:500;color:var(--text-primary);margin:0;max-width:520px;line-height:1.5}
  .meta{font-size:13px;color:var(--text-secondary);margin:0}
  .badge{align-self:flex-start;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--emerald-400);background:var(--emerald-tint-bg);border:1px solid var(--emerald-tint-border);padding:4px 8px;border-radius:9999px}
</style></head>
<body>
  <span class="eyebrow">Welcome back</span>
  <p class="body">Your personal media collection and viewing analytics. Track what you watch, rate and review it, and keep a prioritized watchlist.</p>
  <p class="meta">2024 · TV Show · 42 watched</p>
  <span class="badge">Watched</span>
</body></html>
