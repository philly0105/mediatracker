<!-- @dsCard group="Colors" viewport="700x150" name="Semantic & neutral ramp" subtitle="Amber rating, emerald success, zinc text scale" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:var(--bg-base);font-family:var(--font-sans);color:var(--text-primary);padding:20px;box-sizing:border-box;display:flex;flex-direction:column;gap:14px}
  .row{display:flex;align-items:center;gap:10px}
  .lbl{width:72px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-secondary)}
  .sw{height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 10px;font-size:10px;font-weight:700;font-family:var(--font-mono);flex:1}
  .dot{display:flex;align-items:center;gap:8px;font-size:12px}
  .c{width:18px;height:18px;border-radius:50%}
</style></head>
<body>
  <div class="row"><span class="lbl">Semantic</span>
    <div class="dot"><span class="c" style="background:var(--amber-400)"></span>Amber — rating ★</div>
    <div class="dot"><span class="c" style="background:var(--emerald-400)"></span>Emerald — watched</div>
    <div class="dot"><span class="c" style="background:var(--white)"></span>White — primary button</div>
  </div>
  <div class="row"><span class="lbl">Zinc text</span>
    <div class="sw" style="background:var(--zinc-100);color:#222">100</div>
    <div class="sw" style="background:var(--zinc-300);color:#222">300</div>
    <div class="sw" style="background:var(--zinc-400);color:#222">400</div>
    <div class="sw" style="background:var(--zinc-500)">500</div>
    <div class="sw" style="background:var(--zinc-600)">600</div>
    <div class="sw" style="background:var(--zinc-800)">800</div>
    <div class="sw" style="background:var(--zinc-900)">900</div>
  </div>
</body></html>
