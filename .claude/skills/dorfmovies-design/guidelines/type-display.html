<!-- @dsCard group="Type" viewport="700x200" name="Display & headings" subtitle="Outfit extrabold/black, tight tracking, gradient hero" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:var(--bg-base);background-image:var(--page-radial);font-family:var(--font-sans);color:var(--text-primary);padding:24px 28px;box-sizing:border-box}
  .hero{font-size:48px;font-weight:800;letter-spacing:-0.04em;line-height:1.05;background:linear-gradient(160deg,var(--zinc-100) 40%,var(--zinc-400));-webkit-background-clip:text;background-clip:text;color:transparent;margin:0}
  .h2{font-size:24px;font-weight:800;letter-spacing:-0.02em;margin:14px 0 0}
  .h3{font-size:18px;font-weight:700;margin:10px 0 0}
  .meta{font-size:11px;color:var(--text-muted);font-family:var(--font-mono);margin-top:10px}
</style></head>
<body>
  <p class="hero">Dashboard</p>
  <p class="h2">Recently Watched</p>
  <p class="h3">Dune: Part Two</p>
  <p class="meta">Outfit 800 display -0.04em · 800 h2 · 700 card-title</p>
</body></html>
