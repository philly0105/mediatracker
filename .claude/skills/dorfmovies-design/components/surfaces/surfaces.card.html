<!-- @dsCard group="Components" viewport="700x300" name="Surfaces — Glass, Spotlight, Stat" subtitle="Glass cards, spotlight bento tiles, giant-numeral stats" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body {
    background: var(--bg-void); background-image: var(--page-radial);
    font-family: var(--font-sans); color: var(--text-primary);
    padding: 26px 28px; box-sizing: border-box;
  }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { SpotlightCard, GlassCard, StatTile } = window.DorfMoviesDesignSystem_f30e74;
    function Demo() {
      return (
        <div className="grid">
          <SpotlightCard spotlightColor="rgba(249,115,22,0.14)">
            <StatTile icon="calendar" tone="orange" tag="Year 2026"
              value={42} caption="Watched this year" captionIcon="trending-up" />
          </SpotlightCard>
          <SpotlightCard spotlightColor="rgba(139,92,246,0.16)">
            <StatTile icon="flame" tone="violet" tag="Priority"
              value={7} caption="Must Watch titles" />
          </SpotlightCard>
          <GlassCard glow="rose" padding="22px">
            <p style={{margin:0,fontSize:13,fontWeight:700,color:'var(--rose-400)'}}>Continuing</p>
            <p style={{margin:'6px 0 0',fontSize:24,fontWeight:800,letterSpacing:'-0.02em'}}>Severance</p>
            <p style={{margin:'10px 0 0',fontSize:12,color:'var(--text-muted)'}}>Updated today</p>
          </GlassCard>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
    requestAnimationFrame(() => window.lucide && window.lucide.createIcons());
    setTimeout(() => window.lucide && window.lucide.createIcons(), 300);
  </script>
</body>
</html>
